services:
  mongodb:
    image: mongo:7
    container_name: elyz-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: elyz2027
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: elyz-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "mongodb://mongodb:27017/elyz2027"
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    container_name: elyz-seed
    profiles: ["setup"]
    environment:
      DATABASE_URL: "mongodb://mongodb:27017/elyz2027"
    depends_on:
      mongodb:
        condition: service_healthy

  media-fetch:
    build:
      context: .
      dockerfile: Dockerfile.seed
    container_name: elyz-media-fetch
    profiles: ["tasks"]
    environment:
      DATABASE_URL: "mongodb://mongodb:27017/elyz2027"
    command: ["npx", "tsx", "scripts/fetch-media.ts"]
    depends_on:
      mongodb:
        condition: service_healthy

  programs-fetch:
    build:
      context: .
      dockerfile: Dockerfile.seed
    container_name: elyz-programs-fetch
    profiles: ["tasks"]
    environment:
      DATABASE_URL: "mongodb://mongodb:27017/elyz2027"
    command: ["npx", "tsx", "scripts/fetch-programs.ts"]
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
